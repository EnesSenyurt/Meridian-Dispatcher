version: '3.8'

services:
  # --- SADECE DIŞARI AÇIK OLAN SERVİS ---
  dispatcher:
    build: ./dispatcher
    ports:
      - "8080:8000"  # Dışarıya 8080'den açık. İçerideki 8000'e bağlı.
    networks:
      - meridian_network
    environment:
      - REDIS_URL=redis://redis-dispatcher:6379/0
      - AUTH_SERVICE_URL=http://auth-service:8000
      - DELIVERY_SERVICE_URL=http://delivery-service:8000
      - TRACKING_SERVICE_URL=http://tracking-service:8000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis-dispatcher
      - auth-service
      - delivery-service
      - tracking-service

  # --- DIŞ DÜNYAYA KAPALI İÇ SERVİSLER ---
  auth-service:
    build: ./auth-service
    # port YOK: Dışarıdan doğrudan 5001 gibi portlarla ulaşılamaz!
    networks:
      - meridian_network
    environment:
      - MONGO_URL=mongodb://mongo-auth:27017
      - MONGO_DB=auth_db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo-auth

  delivery-service:
    build: ./delivery-service
    # port YOK: Dışarıdan doğrudan portlarla ulaşılamaz!
    networks:
      - meridian_network
    environment:
      - MONGO_URL=mongodb://mongo-delivery:27017
      - MONGO_DB=delivery_db
    depends_on:
      - mongo-delivery

  # --- İZOLE VERİ TABANLARI (DIŞA KAPALI) ---
  redis-dispatcher:
    image: redis:alpine
    networks:
      - meridian_network

  mongo-auth:
    image: mongo:latest
    networks:
      - meridian_network

  mongo-delivery:
    image: mongo:latest
    networks:
      - meridian_network

  tracking-service:
    build: ./tracking-service
    networks:
      - meridian_network
    environment:
      - REDIS_URL=redis://redis-tracking:6379/0
    depends_on:
      - redis-tracking

  redis-tracking:
    image: redis:alpine
    networks:
      - meridian_network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - meridian_network
    depends_on:
      - dispatcher

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - meridian_network
    depends_on:
      - prometheus

  # --- YÜK TESTLERİ (docker-compose --profile loadtest up locust) ---
  locust:
    build: ./load-tests
    ports:
      - "8089:8089"
    environment:
      - LOCUST_HOST=http://dispatcher:8000
    command: --host http://dispatcher:8000 --locustfile /locust/locustfile.py
    volumes:
      - ./load-tests/results:/locust/results
    networks:
      - meridian_network
    depends_on:
      - dispatcher
    profiles:
      - loadtest

networks:
  meridian_network:
    driver: bridge
